<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Volunteer Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="./volunteer.css"/>
</head>
<body>

<header>
  <div class="subtitle">Join Us</div>
  <h1>UP Pahinungod<br/>Volunteer Program Registration</h1>
  <p>Fill out the form below to sign up as a volunteer.</p>
</header>

<div class="progress-wrap" id="progressWrap">
  <div class="progress-info">
    <span id="stepLabel">Step 1 of 2</span>
    <span id="stepName">Basic Info</span>
  </div>
  <div class="progress-bar-bg">
    <div class="progress-bar-fill" id="progressFill" style="width:50%"></div>
  </div>
</div>

<div class="card" id="mainCard">
  <noscript>
    <div class="global-err show" style="margin-top:16px;">JavaScript is required to complete this form.</div>
  </noscript>
</div>


<footer>
  <div>&copy; 2026 University of the Philippines Manila. All Rights Reserved - Developed by ScyllaCSS</div>
  <div class="footer-logos">
    <img src="../assets/UP_Logo.png" alt="UP Logo" class="footer-logo-img"/>
    <img src="../assets/UP_Pahinungod_Logo.png" alt="UP Pahinungod Logo" class="footer-logo-img"/>
  </div>
</footer>

<script type="module" src="./volunteer-form.js"></script>
<div class="photo-credit">Photo: Zando F. Escultura</div>
</body>
</html>
